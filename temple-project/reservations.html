              <fieldset class="pi">
                  <legend>Personal Information</legend>
                  <label class="info">First Name* <input type="text" name="fname" required></label>
                  <label class="info">Last Name* <input type="text" name="lname" required></label>
                  <label class="info">Title <input type="text" name="title" pattern="([\p{L}\s-]){7,}" placeholder="Position" ></label>
                  <label class="info">Email* <input type="email" name="email" placeholder="someone@gmail.com" required></label>
                  <label class="info">Phone* <input type="tel" name="phone" placeholder="(000) 000-0000" required></label>
              </fieldset>
              <fieldset class="bi">
                  <legend>Business Information</legend>
                  <label class="info">Business Name* <input type="text" name="bName" required></label>
                  <label class="info">Business Description<textarea name="description" placeholder="Brief description of business"></textarea></label>   
                  <input type="hidden" name="datetime" id="todayDate">
              </fieldset>
              <fieldset class="ml">
                  <legend>Membership Level</legend>
                  <label class="level"><input type="radio" name="level" value="NP" required> NP Membership</label>

                  <label class="level"><input type="radio" name="level" value="silver"> Silver Membership</label>
                  <label class="level"><input type="radio" name="level" value="gold"> Gold Membership</label>
